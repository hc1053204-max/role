<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ RPG冒險者之旅 - 三關之戰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div class="background-particles"></div>

    <div class="header">
        <h1>⚔️ RPG 冒險者之旅</h1>
        <p>🗡️ 選擇你的職業，通過三關挑戰，成為真正的英雄！</p>
    </div>

    <!-- 選擇職業頁面 -->
    <div id="selectionScreen" class="screen active">
        <h2>📜 選擇你的職業</h2>
        <div class="characters">
            <div class="card" onclick="selectRole('Warrior', this)">
                <div class="card-icon">⚔️</div>
                <h3>戰士</h3>
                <div class="stats">
                    <p>❤️ HP: 120</p>
                    <p>💪 ATK: 15</p>
                </div>
                <p>攻擊力強，HP充足</p>
            </div>

            <div class="card" onclick="selectRole('Mage', this)">
                <div class="card-icon">🔥</div>
                <h3>法師</h3>
                <div class="stats">
                    <p>❤️ HP: 80</p>
                    <p>⚡ ATK: 22</p>
                </div>
                <p>魔法傷害超高</p>
            </div>

            <div class="card" onclick="selectRole('Archer', this)">
                <div class="card-icon">🏹</div>
                <h3>弓箭手</h3>
                <div class="stats">
                    <p>❤️ HP: 100</p>
                    <p>💨 ATK: 18</p>
                </div>
                <p>速度快，遠程攻擊</p>
            </div>
        </div>
    </div>

    <!-- 戰鬥頁面 -->
    <div id="battleScreen" class="screen">
        <div class="stage-info">
            <span id="stageName">第一關</span>
            <span id="stageProgress">小怪 1/2</span>
        </div>

        <div class="player-info-bar">
            <span id="playerName">戰士</span>
            <span id="playerLevel">Lv.1</span>
        </div>

        <div class="battle-arena">
            <div class="character-section">
                <div id="playerIcon" class="character-icon">⚔️</div>
                <div id="playerNameBattle" class="character-name">戰士</div>
                <div class="stats-panel">
                    <div>HP: <span id="playerHpText">100/100</span></div>
                    <div class="hp-bar-container">
                        <div id="playerHpBar" class="hp-bar" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <div class="vs-sign">VS</div>

            <div class="character-section">
                <div id="monsterIcon" class="character-icon">👹</div>
                <div id="monsterName" class="character-name">小怪</div>
                <div class="stats-panel">
                    <div>HP: <span id="monsterHpText">50/50</span></div>
                    <div class="hp-bar-container">
                        <div id="monsterHpBar" class="hp-bar" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="battle-log">
            <div id="logContent">
                <p class="log-item">⚔️ 準備開始戰鬥...</p>
            </div>
        </div>

        <div class="action-panel">
            <button id="attackBtn" class="action-btn attack-btn" onclick="playerAttack()">⚔️ 攻擊</button>
            <button id="skillBtn" class="action-btn skill-btn" onclick="showSkillMenu()">✨ 技能</button>
            <div id="skillMenu" class="skill-menu" style="display: none;">
                <button class="skill-option" onclick="playerUseSkill(1)">技能 1</button>
                <button class="skill-option" onclick="playerUseSkill(2)">技能 2</button>
                <button class="skill-option" onclick="playerUseSkill(3)">技能 3</button>
                <button class="skill-option" onclick="hideSkillMenu()">取消</button>
            </div>
        </div>
    </div>

    <!-- 結果頁面 -->
    <div id="resultScreen" class="screen">
        <div class="result-container">
            <div id="resultIcon" class="result-icon">🎉</div>
            <h2 id="resultTitle">戰鬥勝利！</h2>
            <div id="resultDetails"></div>
            <button id="nextBtn" class="action-btn primary-btn" onclick="nextBattle()">▶️ 繼續</button>
            <button id="restartBtn" class="action-btn" onclick="restartGame()" style="display: none;">🔄 重新開始</button>
        </div>
    </div>

    <!-- 通關頁面 -->
    <div id="completeScreen" class="screen">
        <div class="result-container">
            <div class="result-icon">🏆</div>
            <h2>🏆 恭喜！通關成功！</h2>
            <div id="finalStats"></div>
            <button class="action-btn primary-btn" onclick="restartGame()">🔄 返回主菜單</button>
        </div>
    </div>

    <!-- 遊戲結束頁面 -->
    <div id="gameOverScreen" class="screen">
        <div class="result-container">
            <div class="result-icon">💀</div>
            <h2>💀 遊戲結束...</h2>
            <div id="gameOverStats"></div>
            <button class="action-btn" onclick="restartGame()">🔄 返回主菜單</button>
        </div>
    </div>
</div>

<div id="damageNumbers"></div>
<script src="game.js"></script>

</body>
</html>
